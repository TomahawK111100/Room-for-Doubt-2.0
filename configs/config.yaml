defaults:
  - _self_
  - dataset: cifar10n
  - model: resnet34
  - optimizer: adam
  - trainer: default

seed: 42
run_id: ${now:%Y%m%d_%H%M%S}
output_dir: outputs

hydra:
  run:
    dir: ${output_dir}/${run_id}
  sweep:
    dir: ${output_dir}/multirun
    subdir: ${hydra.job.num}
dataset:
  batch_size: 1024  # Было 128/256
optimizer:
  lr: 0.003         # Было 0.001
